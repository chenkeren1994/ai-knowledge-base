name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        if: steps.pipeline.outcome == 'success'
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        if: steps.pipeline.outcome == 'success'
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Check for changes
        id: changes
        if: steps.pipeline.outcome == 'success'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No new articles to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Count new articles
        id: count
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          count=$(git status --porcelain knowledge/articles/ | wc -l | xargs)
          echo "article_count=$count" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: add ${{ steps.count.outputs.article_count || 'new' }} articles ($(date -u +%Y-%m-%d))"
          git push
